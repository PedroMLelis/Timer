<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Timer Inteligente PPT</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; background: transparent; }
        
        #app { width: 100%; height: 100%; position: relative; }
        
        /* TELA DE CONFIGURAÇÃO */
        #setup-view { background: rgba(255,255,255,0.95); padding: 15px; box-sizing: border-box; height: 100%; overflow-y: auto; display: block; border: 1px solid #ccc; border-radius: 8px;}
        .form-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .form-group label { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #333; }
        .form-group input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        .btn { background: #0078d4; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; font-size: 12px;}
        .btn:hover { background: #005a9e; }
        
        /* ASSINATURA */
        .signature { text-align: center; font-size: 10px; color: #888; margin-top: 15px; font-style: italic; }
        
        /* TELA DO TIMER */
        #timer-view { display: none; height: 100%; width: 100%; justify-content: center; align-items: center; position: relative; }
        #timer-display { font-weight: bold; font-variant-numeric: tabular-nums; line-height: 1; text-align: center; }
        
        #btn-edit { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); color: white; border: none; padding: 4px 8px; cursor: pointer; font-size: 10px; border-radius: 4px; opacity: 0; transition: opacity 0.3s; }
        #timer-view:hover #btn-edit { opacity: 1; }
    </style>
</head>
<body>
    <div id="app">
        <div id="setup-view">
            <h3 style="margin-top:0; font-size: 14px; text-align: center;">Configurar Timer</h3>
            
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Slide Inicial</label>
                    <input type="number" id="inp-start" value="1" min="1">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Slide Final</label>
                    <input type="number" id="inp-end" value="10" min="1">
                </div>
            </div>

            <div class="form-group">
                <label>Duração (Segundos)</label>
                <input type="number" id="inp-duration" value="300" min="1">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Cor do Texto</label>
                    <input type="color" id="inp-color" value="#000000" style="width: 100%; height: 28px; padding: 0;">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Tamanho (px)</label>
                    <input type="number" id="inp-size" value="60" min="10">
                </div>
            </div>

            <div class="form-group">
                <label>Ao zerar, pular para slide (0 = não pular):</label>
                <input type="number" id="inp-jump" value="0" min="0">
            </div>

            <button class="btn" id="btn-save">Salvar e Iniciar</button>
            
            <div class="signature">Created by: Pedro Lelis, ATN</div>
        </div>

        <div id="timer-view">
            <button id="btn-edit" title="Editar Configurações">Editar</button>
            <div id="timer-display">00:00</div>
        </div>
    </div>

    <script>
        let config = {};
        let pollingInterval = null;

        // Inicializa a API do Office
        Office.onReady((info) => {
            if (info.host === Office.HostType.PowerPoint) {
                const savedConfig = Office.context.document.settings.get("timerConfig");
                
                if (savedConfig) {
                    config = savedConfig;
                    applyStylesToDisplay();
                    showView("timer");
                    startSlidePolling();
                } else {
                    showView("setup");
                }

                document.getElementById("btn-save").onclick = saveConfig;
                document.getElementById("btn-edit").onclick = () => {
                    stopSlidePolling();
                    populateForm();
                    showView("setup");
                };
            }
        });

        function saveConfig() {
            config = {
                startSlide: parseInt(document.getElementById("inp-start").value),
                endSlide: parseInt(document.getElementById("inp-end").value),
                duration: parseInt(document.getElementById("inp-duration").value),
                color: document.getElementById("inp-color").value,
                size: parseInt(document.getElementById("inp-size").value),
                jumpTarget: parseInt(document.getElementById("inp-jump").value)
            };

            Office.context.document.settings.set("timerConfig", config);
            Office.context.document.settings.saveAsync((asyncResult) => {
                if (asyncResult.status === Office.AsyncResultStatus.Succeeded) {
                    applyStylesToDisplay();
                    sessionStorage.removeItem("timerEndTime");
                    sessionStorage.removeItem("timerJumped");
                    
                    showView("timer");
                    startSlidePolling();
                }
            });
        }

        function applyStylesToDisplay() {
            const display = document.getElementById("timer-display");
            display.style.color = config.color;
            display.style.fontSize = config.size + "px";
        }

        function populateForm() {
            if(!config.startSlide) return;
            document.getElementById("inp-start").value = config.startSlide;
            document.getElementById("inp-end").value = config.endSlide;
            document.getElementById("inp-duration").value = config.duration;
            document.getElementById("inp-color").value = config.color;
            document.getElementById("inp-size").value = config.size;
            document.getElementById("inp-jump").value = config.jumpTarget;
        }

        function showView(viewName) {
            document.getElementById("setup-view").style.display = viewName === "setup" ? "block" : "none";
            document.getElementById("timer-view").style.display = viewName === "timer" ? "flex" : "none";
        }

        function startSlidePolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            
            pollingInterval = setInterval(() => {
                Office.context.document.getSelectedDataAsync(Office.CoercionType.SlideRange, (asyncResult) => {
                    if (asyncResult.status === Office.AsyncResultStatus.Succeeded) {
                        const currentSlideIndex = asyncResult.value.slides[0].index;
                        processLogicForSlide(currentSlideIndex);
                    }
                });
            }, 1000);
        }

        function stopSlidePolling() {
            if (pollingInterval) clearInterval(pollingInterval);
        }

        function processLogicForSlide(currentIndex) {
            const timerView = document.getElementById("timer-view");

            if (currentIndex >= config.startSlide && currentIndex <= config.endSlide) {
                timerView.style.visibility = "visible";
                
                if (!sessionStorage.getItem("timerEndTime")) {
                    const endMs = Date.now() + (config.duration * 1000);
                    sessionStorage.setItem("timerEndTime", endMs.toString());
                }

                const endTime = parseInt(sessionStorage.getItem("timerEndTime"));
                const timeLeft = Math.max(0, endTime - Date.now());

                updateDisplay(timeLeft);

                if (timeLeft === 0 && config.jumpTarget > 0) {
                    const alreadyJumped = sessionStorage.getItem("timerJumped");
                    if (!alreadyJumped) {
                        sessionStorage.setItem("timerJumped", "true");
                        Office.context.document.goToByIdAsync(config.jumpTarget, Office.GoToType.Index);
                    }
                }
            } else {
                timerView.style.visibility = "hidden";
            }
        }

        function updateDisplay(ms) {
            const totalSeconds = Math.ceil(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            
            document.getElementById("timer-display").innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
