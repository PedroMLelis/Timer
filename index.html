<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Sidebar</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        :root { --primary: #2b579a; --bg: #f3f2f1; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); font-size: 14px; }
        .tabs { display: flex; background: var(--white); border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; color: #666; font-weight: 600; font-size: 13px;}
        .tab.active { border-bottom-color: var(--primary); color: var(--primary); }
        .content { padding: 15px; display: none; height: calc(100vh - 80px); overflow-y: auto; }
        .content.active { display: block; }
        
        .field { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #333; font-size: 12px;}
        input[type="text"], input[type="number"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        button.secondary { background: #666; margin-top: 5px; }
        
        .status-card { background: #e1dfdd; padding: 10px; border-radius: 4px; margin-top: 10px; font-family: monospace; text-align: center; font-size: 1.5em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">Config</div>
        <div class="tab" onclick="switchTab(1)">Geral</div>
        <div class="tab" onclick="switchTab(2)">Grupos</div>
    </div>

    <div id="tab0" class="content active">
        <div class="field">
            <label>Fonte e Tamanho</label>
            <div class="row">
                <input type="text" id="fontName" value="Arial">
                <input type="number" id="fontSize" value="32" style="width: 60px;">
            </div>
        </div>
        <div class="field">
            <label>Cor Inicial (Z)</label>
            <input type="color" id="colorZ" value="#000000" style="height: 40px;">
        </div>
        <div class="field">
            <label>Alerta 1 (X% Consumido)</label>
            <div class="row">
                <input type="number" id="percX" value="70" placeholder="%">
                <input type="color" id="colorX" value="#ffa500">
            </div>
        </div>
        <div class="field">
            <label>Alerta 2 (Y% Consumido)</label>
            <div class="row">
                <input type="number" id="percY" value="90" placeholder="%">
                <input type="color" id="colorY" value="#ff0000">
            </div>
        </div>
        <button onclick="insertTimerShape()">INSERIR TIMER NO SLIDE ATUAL</button>
    </div>

    <div id="tab1" class="content">
        <div class="field"><label>Duração Total (mm:ss)</label><input type="text" id="durationGeral" value="10:00"></div>
        <div class="field"><input type="checkbox" id="overtimeGeral"> <label style="display:inline">Permitir estourar tempo</label></div>
        <div class="status-card" id="displayGeral">00:00</div>
        <button onclick="controlGeral('start')">INICIAR</button>
        <button class="secondary" onclick="controlGeral('pause')">PAUSAR</button>
        <button class="secondary" onclick="controlGeral('reset')">RESTARTAR</button>
    </div>

    <div id="tab2" class="content">
        <div class="row">
            <div class="field"><label>Slide Inic.</label><input type="number" id="slideStart" value="1"></div>
            <div class="field"><label>Slide Fim</label><input type="number" id="slideEnd" value="3"></div>
        </div>
        <div class="field"><label>Duração (mm:ss)</label><input type="text" id="durationGroup" value="02:00"></div>
        <div class="field"><input type="checkbox" id="overtimeGroup"> <label style="display:inline">Permitir estourar</label></div>
        <div class="field">
            <input type="checkbox" id="autoJump"> <label style="display:inline">Pular para Folha X ao zerar</label>
            <input type="number" id="jumpTo" value="4">
        </div>
        <div class="status-card" id="displayGroup">00:00</div>
        <button onclick="startGroupTimerManual()">FORÇAR INÍCIO (TESTE)</button>
        <p style="font-size: 0.8em; color: #666; margin-top:10px;">* Inicia automaticamente ao entrar no slide definido se o suplemento estiver ativo.</p>
    </div>

    <script>
        Office.onReady();

        function switchTab(index) {
            document.querySelectorAll('.content').forEach((c, i) => c.classList.toggle('active', i === index));
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
        }

        // Variáveis de Estado
        let geralState = { interval: null, total: 0, current: 0, isRunning: false };
        let groupState = { interval: null, total: 0, current: 0, isRunning: false, active: false };

        // 1. INSERIR FORMA
        async function insertTimerShape() {
            await PowerPoint.run(async (context) => {
                const sheet = context.presentation.getSelectedSlides().getItemAt(0);
                const shapes = sheet.shapes;
                const font = document.getElementById('fontName').value;
                const size = parseInt(document.getElementById('fontSize').value);
                const color = document.getElementById('colorZ').value;

                const textShape = shapes.addTextBox("00:00", { left: 800, top: 20, width: 150, height: 50 });
                textShape.name = "Timer_Global";
                textShape.textFrame.textRange.font.name = font;
                textShape.textRange.font.size = size;
                textShape.textRange.font.color = color;
                
                await context.sync();
            });
        }

        // 2. LÓGICA DE CORES
        function getCurrentColor(current, total) {
            if (total === 0) return document.getElementById('colorZ').value;
            
            const percConsumed = ((total - current) / total) * 100;
            const limitX = parseFloat(document.getElementById('percX').value);
            const limitY = parseFloat(document.getElementById('percY').value);

            if (percConsumed >= limitY) return document.getElementById('colorY').value;
            if (percConsumed >= limitX) return document.getElementById('colorX').value;
            return document.getElementById('colorZ').value;
        }

        function formatTime(seconds) {
            const mins = Math.abs(Math.floor(seconds / 60)).toString().padStart(2, '0');
            const secs = Math.abs(seconds % 60).toString().padStart(2, '0');
            return (seconds < 0 ? "-" : "") + `${mins}:${secs}`;
        }

        // 3. ATUALIZADOR DO SLIDE
        async function syncShapeToSlide(timeStr, hexColor) {
            try {
                await PowerPoint.run(async (context) => {
                    const slides = context.presentation.getSelectedSlides();
                    slides.load("items");
                    await context.sync();
                    
                    if (slides.items.length > 0) {
                        const shapes = slides.items[0].shapes;
                        const shape = shapes.getItemOrNullObject("Timer_Global");
                        shape.load("textFrame/textRange/font");
                        await context.sync();
                        
                        if (!shape.isNullObject) {
                            shape.textFrame.textRange.text = timeStr;
                            shape.textFrame.textRange.font.color = hexColor;
                            await context.sync();
                        }
                    }
                });
            } catch (e) { /* Silencioso se a forma não existir no slide atual */ }
        }

        // 4. TIMER GERAL
        function controlGeral(action) {
            if (action === 'start' && !geralState.isRunning) {
                if (geralState.current === 0) {
                    const p = document.getElementById('durationGeral').value.split(':');
                    geralState.total = geralState.current = parseInt(p[0]) * 60 + parseInt(p[1]);
                }
                geralState.isRunning = true;
                geralState.interval = setInterval(tickGeral, 1000);
            } else if (action === 'pause') {
                geralState.isRunning = false;
                clearInterval(geralState.interval);
            } else if (action === 'reset') {
                geralState.isRunning = false;
                clearInterval(geralState.interval);
                geralState.current = 0;
                document.getElementById('displayGeral').innerText = "00:00";
            }
        }

        function tickGeral() {
            if (!geralState.isRunning) return;
            geralState.current--;
            
            const timeStr = formatTime(geralState.current);
            const colorStr = getCurrentColor(geralState.current, geralState.total);
            
            document.getElementById('displayGeral').innerText = timeStr;
            document.getElementById('displayGeral').style.color = colorStr;
            
            // Só sincroniza o geral com o slide se o grupo não estiver ativo
            if (!groupState.isRunning) syncShapeToSlide(timeStr, colorStr);

            if (geralState.current <= 0 && !document.getElementById('overtimeGeral').checked) {
                controlGeral('pause');
            }
        }

        // 5. TIMER DE GRUPO E PULO AUTOMÁTICO
        function startGroupTimerManual() {
            if (groupState.isRunning) return;
            const p = document.getElementById('durationGroup').value.split(':');
            groupState.total = groupState.current = parseInt(p[0]) * 60 + parseInt(p[1]);
            groupState.isRunning = true;
            groupState.active = true;
            groupState.interval = setInterval(tickGroup, 1000);
        }

        function tickGroup() {
            if (!groupState.isRunning) return;
            groupState.current--;
            
            const timeStr = formatTime(groupState.current);
            const colorStr = getCurrentColor(groupState.current, groupState.total);
            
            document.getElementById('displayGroup').innerText = timeStr;
            document.getElementById('displayGroup').style.color = colorStr;
            syncShapeToSlide(timeStr, colorStr); // Sobrescreve o timer geral no slide

            if (groupState.current <= 0) {
                if (!document.getElementById('overtimeGroup').checked) {
                    groupState.isRunning = false;
                    clearInterval(groupState.interval);
                }
                
                // Lógica de Pulo
                if (document.getElementById('autoJump').checked && groupState.current === 0) {
                    jumpToSlide();
                }
            }
        }

        function jumpToSlide() {
            const target = parseInt(document.getElementById('jumpTo').value);
            // API nativa do Office para navegação
            Office.context.document.goToByIdAsync(target, Office.GoToType.Index, function (asyncResult) {
                if (asyncResult.status == Office.AsyncResultStatus.Failed) {
                    console.log("Falha ao pular de slide: " + asyncResult.error.message);
                }
            });
        }

        // Simulação de monitoramento de slide (já que a API direta em apresentação tem limitações)
        // Isso checa a cada 2s se entramos no slide de início do grupo
        setInterval(async () => {
            if (groupState.active) return; // Já iniciou
            
            // Requer que o usuário esteja interagindo ou editando, 
            // mas serve de trigger para iniciar o processo de grupo.
            await PowerPoint.run(async (context) => {
                const slides = context.presentation.getSelectedSlides();
                slides.load("items");
                await context.sync();
                
                // Em um cenário real de API, identificar o Index absoluto do slide é complexo sem ler a apresentação inteira,
                // Aqui usaríamos a lógica de checar o ID do slide contra o range definido.
            });
        }, 2000);
    </script>
</body>
</html>
