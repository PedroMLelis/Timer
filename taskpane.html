<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h3>Configurar Timer</h3>

<label>Slide Inicial</label>
<input id="start" type="number" value="1">

<label>Slide Final</label>
<input id="end" type="number" value="10">

<label>Duração (s)</label>
<input id="duration" type="number" value="300">

<label>Cor</label>
<input id="color" type="color" value="#000000">

<label>Tamanho</label>
<input id="size" type="number" value="60">

<label>Slide ao finalizar</label>
<input id="jump" type="number" value="0">

<button id="save">Salvar</button>

<script src="taskpane.js"></script>
</body>
</html>
