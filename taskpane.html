<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Timers</title>

    <!-- Office -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <style>
        body { font-family: Segoe UI; padding:10px; }

        .hidden { display:none; }

        .timer-item {
            border:1px solid #ccc;
            padding:8px;
            margin-bottom:6px;
            border-radius:4px;
            font-size:12px;
        }

        button {
            margin-top:8px;
            padding:6px;
            width:100%;
            cursor: pointer;
        }

        #status {
            margin-top:10px;
            font-size:12px;
        }
    </style>
</head>

<body>

<h3>Timers</h3>

<div id="list-view"></div>

<button id="btn-add">+ Adicionar Timer</button>

<!-- FORM -->
<div id="form-view" class="hidden">

    <h4>Novo Timer</h4>

    <label>Slide Inicial</label>
    <input id="start" type="number" value="1">

    <label>Slide Final</label>
    <input id="end" type="number" value="5">

    <label>Duração (s)</label>
    <input id="duration" type="number" value="300">

    <label>Cor</label>
    <input id="color" type="color" value="#000000">

    <label>Tamanho</label>
    <input id="size" type="number" value="60">

    <label>Slide ao finalizar</label>
    <input id="jump" type="number" value="0">

    <button id="save" type="button">Salvar</button>
    <button id="cancel" type="button">Cancelar</button>

</div>

<div id="status"></div>

<!-- 🔥 SEU SCRIPT (ESSENCIAL) -->
<script src="https://pedromlelis.github.io/Timer/taskpane.js?v=8"></script>

</body>
</html>
