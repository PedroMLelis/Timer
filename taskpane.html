<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Configurar Timer</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Anti-cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
        body {
            font-family: Segoe UI, sans-serif;
            padding: 10px;
            margin: 0;
        }

        label {
            display: block;
            margin-top: 8px;
            font-size: 12px;
        }

        input {
            width: 100%;
            padding: 5px;
            margin-top: 2px;
            font-size: 12px;
            box-sizing: border-box;
        }

        button {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h3>Configurar Timer</h3>

    <label for="start">Slide Inicial</label>
    <input id="start" type="number" value="1">

    <label for="end">Slide Final</label>
    <input id="end" type="number" value="10">

    <label for="duration">Duração (s)</label>
    <input id="duration" type="number" value="300">

    <label for="color">Cor</label>
    <input id="color" type="color" value="#000000">

    <label for="size">Tamanho</label>
    <input id="size" type="number" value="60">

    <label for="jump">Slide ao finalizar</label>
    <input id="jump" type="number" value="0">

    <button id="save" type="button">Salvar</button>

    <div id="status"></div>

    <!-- IMPORTANTE: versionamento -->
    <script src="taskpane.js?v=3"></script>

</body>
</html>
