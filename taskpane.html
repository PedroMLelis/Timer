<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timers</title>

<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

<style>
body { font-family: Segoe UI; padding:10px; }

.hidden { display:none; }

.timer-item {
    border:1px solid #ccc;
    padding:8px;
    margin-bottom:6px;
    border-radius:4px;
    font-size:12px;
}

.row { display:flex; gap:5px; margin-top:5px; }

button {
    padding:6px;
    cursor:pointer;
    flex:1;
}

#status { margin-top:10px; font-size:12px; }
</style>
</head>

<body>

<h3>Timers</h3>

<div id="list-view"></div>

<button id="btn-add">+ Adicionar Timer</button>

<!-- FORM -->
<div id="form-view" class="hidden">

<h4 id="form-title">Novo Timer</h4>

<label>Slide Inicial</label>
<input id="start" type="number">

<label>Slide Final</label>
<input id="end" type="number">

<label>Duração (s)</label>
<input id="duration" type="number">

<label>Cor</label>
<input id="color" type="color">

<label>Tamanho</label>
<input id="size" type="number">

<label>Slide ao finalizar</label>
<input id="jump" type="number">

<button id="save">Salvar</button>
<button id="cancel">Cancelar</button>

</div>

<div id="status"></div>

<script src="https://pedromlelis.github.io/Timer/taskpane.js?v=10"></script>

</body>
</html>
